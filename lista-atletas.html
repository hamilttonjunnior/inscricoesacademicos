<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base de Dados Atletas - Viana Volei</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>Viana Volei</h1>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="atletas.html">Atletas</a>
            <a href="treinadores.html">Treinadores</a>
            <a href="escaloes.html">Escalões</a>
            <a href="financeiro.html">Financeiro</a>
        </nav>
    </header>

    <main class="container">
        <section>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">
                <h2 style="margin: 0;">Base de Dados Atletas</h2>
                <a href="atletas.html" class="btn-link" style="width: auto; padding: 10px 20px; font-size: 0.75rem;">+ Nova Inscrição</a>
            </div>

            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin-bottom: 30px;">
                <div class="input-group" style="margin-bottom: 0;">
                    <label>Pesquisar Nome</label>
                    <input type="text" id="filtro-nome" placeholder="Escreve o nome da atleta...">
                </div>
                <div class="input-group" style="margin-bottom: 0;">
                    <label>Filtrar por Escalão</label>
                    <select id="filtro-escalao">
                        <option value="">Todos os Escalões</option>
                    </select>
                </div>
            </div>

            <div id="lista-atletas-cards">
                <p style="text-align: center; color: #888; padding: 40px;">
                    A carregar a base de dados...
                </p>
            </div>
        </section>

        <footer style="text-align: center; margin-top: 60px; padding-bottom: 40px; color: #bbb; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px;">
            Viana Volei &bull; Sistema de Gestão Interna &bull; 2026
        </footer>
    </main>

    <script type="module" src="lista-atletas.js"></script>
</body>
</html>
