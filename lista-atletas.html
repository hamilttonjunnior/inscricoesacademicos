<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Atletas - Viana Volei</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>Viana Volei</h1>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="atletas.html">Atletas</a>
            <a href="treinadores.html">Treinadores</a>
            <a href="escaloes.html">Escalões</a>
            <a href="financeiro.html">Financeiro</a>
        </nav>
    </header>

    <main class="container">
        <section>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h2 style="margin: 0;">Gestão de Atletas</h2>
                <a href="atletas.html" class="btn-link" style="width: auto; padding: 10px 20px;">+ Nova Inscrição</a>
            </div>

            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin-bottom: 30px;">
                <input type="text" id="filtro-nome" placeholder="Pesquisar por nome...">
                <select id="filtro-escalao">
                    <option value="">Todos os Escalões</option>
                </select>
            </div>

            <div id="lista-atletas-cards">
                <p style="text-align: center; color: #888;">A carregar atletas...</p>
            </div>
        </section>
    </main>

    <script type="module" src="lista-atletas.js"></script>
</body>
</html>
