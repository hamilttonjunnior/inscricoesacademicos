<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição de Atletas - Viana Volei</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Viana Volei - Gestão</h1>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="atletas.html" class="active">Atletas</a>
            <a href="treinadores.html">Treinadores</a>
            <a href="escaloes.html">Escalões</a>
            <a href="financeiro.html">Financeiro</a>
        </nav>
    </header>

    <main class="container">
        <section>
            <h2>Nova Inscrição Federada</h2>
            <form id="form-atleta">
                <fieldset>
                    <legend>Dados Pessoais</legend>
                    <div class="input-group"><label>Nome Completo</label><input type="text" id="nome" required></div>
                    <div class="grid-2-col">
                        <div class="input-group"><label>Data Nascimento</label><input type="date" id="data_nasc" required></div>
                        <div class="input-group"><label>Nacionalidade</label><input type="text" id="nacionalidade"></div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Documentação e Saúde</legend>
                    <div class="grid-2-col">
                        <div class="input-group"><label>CC / Passaporte</label><input type="text" id="doc_id"></div>
                        <div class="input-group"><label>Validade</label><input type="date" id="val_id"></div>
                    </div>
                    <div class="grid-2-col">
                        <div class="input-group"><label>NIF</label><input type="text" id="nif"></div>
                        <div class="input-group"><label>N° Utente</label><input type="text" id="utente"></div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Contactos e Clube</legend>
                    <div class="input-group"><label>Telemóvel</label><input type="tel" id="tel" required></div>
                    <div class="input-group"><label>Morada</label><input type="text" id="morada"></div>
                    <div class="grid-2-col">
                        <div class="input-group"><label>Escalão</label><select id="atleta-escalao"></select></div>
                        <div class="input-group">
                            <label>Mensalidade</label>
                            <select id="isento">
                                <option value="false">Pagante (20€)</option>
                                <option value="true">Isento (Treinador/Atleta)</option>
                            </select>
                        </div>
                    </div>
                </fieldset>
                <button type="submit">Gravar Atleta Profissionalmente</button>
            </form>
        </section>
    </main>
    <script type="module" src="atletas.js"></script>
</body>
</html>
