<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - Viana Volei</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Viana Volei - Gestão</h1>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="atletas.html" class="active">Atletas</a>
            <a href="treinadores.html">Treinadores</a>
            <a href="financeiro.html">Financeiro</a>
        </nav>
    </header>
    <main class="container">
        <form id="form-atleta">
            <fieldset>
                <legend>Dados da Atleta</legend>
                <div class="input-group"><label>Nome Completo</label><input type="text" id="nome" required></div>
                <div class="grid-2-col">
                    <div class="input-group"><label>Escalão</label><select id="escalao" required></select></div>
                    <div class="input-group"><label>Telemóvel</label><input type="tel" id="telefone" required></div>
                </div>
                <div class="input-group">
                    <label>Tipo de Mensalidade</label>
                    <select id="isento">
                        <option value="false">Pagante (20€)</option>
                        <option value="true">Isento (Treinador/Atleta)</option>
                    </select>
                </div>
                </fieldset>
            <button type="submit">Finalizar Inscrição</button>
        </form>
        <div id="lista-cards" style="margin-top:20px"></div>
    </main>
    <script type="module" src="atletas.js"></script>
</body>
</html>
