
<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Académicos - Sistema de Gestão</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>FC Académicos - Sistema de Gestão</h1>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="atletas.html" class="active">Atletas</a>
            <a href="treinadores.html">Treinadores</a>
            <a href="escaloes.html">Escalões</a>
            <a href="financeiro.html">Financeiro</a>
        </nav>
    </header>

    <main class="container">
        <section>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 15px;">
                <h2 id="titulo-form" style="margin: 0;">Nova Inscrição Federada</h2>
                <a href="lista-atletas.html" style="color: var(--soft-gray); font-size: 0.75rem; text-decoration: none; font-weight: 700; text-transform: uppercase; border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 2px;">Consultar Base de Dados →</a>
            </div>

            <form id="form-atleta">
                <input type="hidden" id="atleta-id">

                <fieldset>
                    <legend>1. Identificação da Atleta</legend>
                    <div class="input-group">
                        <label>Nome Completo</label>
                        <input type="text" id="nome" required placeholder="Nome completo">
                    </div>
                    <div class="grid-2-col">
                        <div class="input-group"><label>Data de Nascimento</label><input type="date" id="data_nasc" required></div>
                        <div class="input-group"><label>Nacionalidade</label><input type="text" id="nacionalidade" placeholder="Ex: Portuguesa"></div>
                    </div>
                    <div class="input-group"><label>Naturalidade</label><input type="text" id="naturalidade" placeholder="Concelho"></div>
                </fieldset>

                <fieldset>
                    <legend>2. Documentação e Saúde</legend>
                    <div class="grid-2-col">
                        <div class="input-group"><label>N° CC / Passaporte</label><input type="text" id="doc_id"></div>
                        <div class="input-group"><label>Validade</label><input type="date" id="val_id"></div>
                    </div>
                    <div class="grid-2-col">
                        <div class="input-group"><label>NIF</label><input type="text" id="nif"></div>
                        <div class="input-group"><label>N° Utente Saúde</label><input type="text" id="utente"></div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>3. Filiação e Contactos</legend>
                    <div class="grid-2-col">
                        <div class="input-group"><label>Nome do Pai</label><input type="text" id="nome_pai"></div>
                        <div class="input-group"><label>Nome da Mãe</label><input type="text" id="nome_mae"></div>
                    </div>
                    <div class="input-group"><label>Telemóvel</label><input type="tel" id="tel" required></div>
                    <div class="input-group"><label>Morada Completa</label><input type="text" id="morada"></div>
                </fieldset>

                <fieldset>
                    <legend>4. Informações do Clube</legend>
                    <div class="grid-2-col">
                        <div class="input-group">
                            <label>Escalão</label>
                            <select id="atleta-escalao" required><option value="">A carregar...</option></select>
                        </div>
                        <div class="input-group">
                            <label>Situação Financeira</label>
                            <select id="isento">
                                <option value="false">Pagante (20€/mês)</option>
                                <option value="true">Isento (Staff / Interna)</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group"><label>Licença FPV n.°</label><input type="text" id="licenca"></div>
                </fieldset>

                <div id="botoes-salvar">
                    <button type="submit" id="btn-gravar">GRAVAR INSCRIÇÃO COMPLETA</button>
                </div>
                <div id="botoes-edicao" style="display: none; gap: 10px; margin-top: 20px;">
                    <button type="button" id="btn-atualizar" style="flex: 2; background: var(--accent-gray);">ATUALIZAR DADOS</button>
                    <button type="button" id="btn-cancelar" style="flex: 1; background: #eee; color: #333; border: 1px solid #ddd;">CANCELAR</button>
                </div>
            </form>
        </section>
    </main>

    <script type="module" src="atletas.js"></script>
</body>
</html>
