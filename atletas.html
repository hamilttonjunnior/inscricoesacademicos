<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - Viana Volei</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>Viana Volei</h1>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="atletas.html" class="active">Atletas</a>
            <a href="treinadores.html">Treinadores</a>
            <a href="escaloes.html">Escalões</a>
            <a href="financeiro.html">Financeiro</a>
        </nav>
    </header>

    <main class="container">
        <section>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 15px;">
                <h2 style="margin: 0;">Nova Inscrição Federada</h2>
                <a href="lista-atletas.html" style="color: var(--soft-gray); font-size: 0.75rem; text-decoration: none; font-weight: 700; text-transform: uppercase; border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 2px;">Consultar Base de Dados →</a>
            </div>

            <form id="form-atleta">
                <fieldset>
                    <legend>1. Identificação da Atleta</legend>
                    <div class="input-group">
                        <label>Nome Completo</label>
                        <input type="text" id="nome" required placeholder="Nome completo da atleta">
                    </div>
                    <div class="grid-2-col">
                        <div class="input-group">
                            <label>Data de Nascimento</label>
                            <input type="date" id="data_nasc" required>
                        </div>
                        <div class="input-group">
                            <label>Nacionalidade</label>
                            <input type="text" id="nacionalidade" placeholder="Ex: Portuguesa">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Naturalidade</label>
                        <input type="text" id="naturalidade" placeholder="Concelho de nascimento">
                    </div>
                </fieldset>

                <fieldset>
                    <legend>2. Documentação e Saúde</legend>
                    <div class="grid-2-col">
                        <div class="input-group">
                            <label>N° CC / Passaporte</label>
                            <input type="text" id="doc_id" placeholder="Número do documento">
                        </div>
                        <div class="input-group">
                            <label>Validade</label>
                            <input type="date" id="val_id">
                        </div>
                    </div>
                    <div class="grid-2-col">
                        <div class="input-group">
                            <label>NIF (Contribuinte)</label>
                            <input type="text" id="nif" placeholder="9 dígitos">
                        </div>
                        <div class="input-group">
                            <label>N° Utente de Saúde</label>
                            <input type="text" id="utente" placeholder="Número do cartão de saúde">
                        </div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>3. Filiação e Contactos</legend>
                    <div class="grid-2-col">
                        <div class="input-group">
                            <label>Nome do Pai</label>
                            <input type="text" id="nome_pai" placeholder="Nome completo">
                        </div>
                        <div class="input-group">
                            <label>Nome da Mãe</label>
                            <input type="text" id="nome_mae" placeholder="Nome completo">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Telemóvel de Contacto</label>
                        <input type="tel" id="tel" required placeholder="Ex: 912345678">
                    </div>
                    <div class="input-group">
                        <label>Morada Completa</label>
                        <input type="text" id="morada" placeholder="Rua, n°, andar e localidade">
                    </div>
                </fieldset>

                <fieldset>
                    <legend>4. Informações do Clube</legend>
                    <div class="grid-2-col">
                        <div class="input-group">
                            <label>Escalão</label>
                            <select id="atleta-escalao" required>
                                <option value="">A carregar escalões...</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Situação Financeira</label>
                            <select id="isento">
                                <option value="false">Pagante (20€/mês)</option>
                                <option value="true">Isento (Staff / Atleta Interna)</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Licença FPV n.°</label>
                        <input type="text" id="licenca" placeholder="Caso já possua número de federada">
                    </div>
                </fieldset>

                <button type="submit">GRAVAR INSCRIÇÃO COMPLETA</button>
            </form>
        </section>
    </main>

    <script type="module" src="atletas.js"></script>
</body>
</html>
