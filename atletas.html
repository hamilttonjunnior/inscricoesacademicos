<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - Viana Volei</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>Viana Volei</h1>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="atletas.html" class="active">Atletas</a>
            <a href="treinadores.html">Treinadores</a>
            <a href="escaloes.html">Escalões</a>
            <a href="financeiro.html">Financeiro</a>
        </nav>
    </header>

    <main class="container">
        <section>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 15px;">
                <h2 style="margin: 0;">Nova Inscrição</h2>
                <a href="lista-atletas.html" style="color: #888; font-size: 0.75rem; text-decoration: none; font-weight: 700; text-transform: uppercase; border: 1px solid #ddd; padding: 8px 12px; border-radius: 2px;">Ver Todas as Atletas →</a>
            </div>

            <form id="form-atleta">
                <fieldset>
                    <legend>Identificação</legend>
                    <div class="input-group">
                        <label>Nome Completo</label>
                        <input type="text" id="nome" required>
                    </div>
                    <div class="grid-2-col">
                        <div class="input-group"><label>Data Nascimento</label><input type="date" id="data_nasc" required></div>
                        <div class="input-group"><label>Nacionalidade</label><input type="text" id="nacionalidade"></div>
                    </div>
                    <div class="input-group"><label>Naturalidade</label><input type="text" id="naturalidade"></div>
                </fieldset>

                <fieldset>
                    <legend>Documentação</legend>
                    <div class="grid-2-col">
                        <div class="input-group"><label>N° CC / Passaporte</label><input type="text" id="doc_id"></div>
                        <div class="input-group"><label>Validade</label><input type="date" id="val_id"></div>
                    </div>
                    <div class="grid-2-col">
                        <div class="input-group"><label>NIF</label><input type="text" id="nif"></div>
                        <div class="input-group"><label>N° Utente Saúde</label><input type="text" id="utente"></div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Contactos e Família</legend>
                    <div class="grid-2-col">
                        <div class="input-group"><label>Nome do Pai</label><input type="text" id="nome_pai"></div>
                        <div class="input-group"><label>Nome da Mãe</label><input type="text" id="nome_mae"></div>
                    </div>
                    <div class="input-group"><label>Telemóvel</label><input type="tel" id="tel" required></div>
                    <div class="input-group"><label>Morada</label><input type="text" id="morada"></div>
                </fieldset>

                <fieldset>
                    <legend>Clube</legend>
                    <div class="grid-2-col">
                        <div class="input-group">
                            <label>Escalão</label>
                            <select id="atleta-escalao" required>
                                <option value="">A carregar...</option>
                            </select>
                        </div>
                        <div class="input-group"><label>Licença FPV</label><input type="text" id="licenca"></div>
                    </div>
                    <div class="input-group">
                        <label>Mensalidade</label>
                        <select id="isento">
                            <option value="false">Pagante (20€)</option>
                            <option value="true">Isento (Treinador/Atleta)</option>
                        </select>
                    </div>
                </fieldset>

                <button type="submit">Gravar Registro</button>
            </form>
        </section>
    </main>

    <script type="module" src="atletas.js"></script>
</body>
</html>
