<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viana Volei - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Viana Volei - Gestão</h1>
        <nav>
            <a href="index.html" class="active">Dashboard</a>
            <a href="atletas.html">Atletas</a>
            <a href="treinadores.html">Treinadores</a>
            <a href="escaloes.html">Escalões</a>
            <a href="financeiro.html">Financeiro</a>
        </nav>
    </header>
    <main class="container">
        <section class="grid-2-col">
            <div style="background: var(--primary); color: white; padding: 20px; border-radius: 10px;">
                <h3>Atletas Inscritas</h3>
                <p id="count-atletas" style="font-size: 2.5rem; margin: 0;">0</p>
            </div>
            <div style="background: var(--secondary); color: white; padding: 20px; border-radius: 10px;">
                <h3>Treinadores</h3>
                <p id="count-treinadores" style="font-size: 2.5rem; margin: 0;">0</p>
            </div>
        </section>
        <section>
            <h3>Acesso Rápido</h3>
            <div class="grid-2-col">
                <a href="atletas.html" class="btn-link">📝 Nova Inscrição</a>
                <a href="financeiro.html" class="btn-link" style="background: #555;">💶 Cobranças</a>
            </div>
        </section>
    </main>
    <script type="module" src="dashboard.js"></script>
</body>
</html>
