<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viana Volei - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Viana Volei - Gestão</h1>
        <nav>
            <a href="index.html" class="active">Dashboard</a>
            <a href="atletas.html">Atletas</a>
            <a href="treinadores.html">Treinadores</a>
            <a href="financeiro.html">Financeiro</a>
        </nav>
    </header>

    <main class="container">
        <h2>Painel Geral</h2>
        
        <div class="grid-resumo" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
            <div class="card-atleta" style="border-left-color: #1a237e;">
                <h3>Atletas</h3>
                <p id="total-atletas" style="font-size: 2rem; font-weight: bold;">0</p>
            </div>

            <div class="card-atleta" style="border-left-color: #f39c12;">
                <h3>Treinadores</h3>
                <p id="total-treinadores" style="font-size: 2rem; font-weight: bold;">0</p>
            </div>

            <div class="card-atleta" style="border-left-color: #d32f2f;">
                <h3>Mensalidades</h3>
                <p id="total-pendente" style="font-size: 1.2rem; font-weight: bold; color: #d32f2f;">Pendente</p>
                <small>Controle dia 10</small>
            </div>
        </div>

        <section style="margin-top: 40px;">
            <h3>Ações Rápidas</h3>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <a href="atletas.html" class="btn-link">Inscrição de Atleta</a>
                <a href="treinadores.html" class="btn-link" style="background-color: #1a237e;">Gerir Treinadores/Escalões</a>
                <a href="financeiro.html" class="btn-link" style="background-color: #555;">Sistema de Cobrança</a>
            </div>
        </section>
    </main>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
