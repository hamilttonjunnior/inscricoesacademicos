<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viana Volei - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>Viana Volei - Gestão</h1>
        <nav>
            <a href="index.html" class="active">Dashboard</a>
            <a href="atletas.html">Atletas</a>
            <a href="treinadores.html">Treinadores</a>
            <a href="escaloes.html">Escalões</a>
            <a href="financeiro.html">Financeiro</a>
        </nav>
    </header>

    <main class="container">
        <section class="grid-resumo" style="background: transparent; border: none; box-shadow: none; padding: 0;">
            <div class="card-resumo">
                <h3>Atletas Inscritas</h3>
                <span id="count-atletas" class="count-number">0</span>
                <small style="opacity: 0.7; text-transform: uppercase; font-size: 0.7rem;">Época 2025/2026</small>
            </div>

            <div class="card-resumo" style="background: var(--secondary-gradient);">
                <h3>Treinadores</h3>
                <span id="count-treinadores" class="count-number">0</span>
                <small style="opacity: 0.7; text-transform: uppercase; font-size: 0.7rem;">Staff Técnico</small>
            </div>
        </section>

        <section>
            <h3>Gestão do Clube</h3>
            <div class="grid-2-col" style="margin-top: 20px;">
                <a href="atletas.html" class="btn-link">📝 Nova Inscrição de Atleta</a>
                <a href="financeiro.html" class="btn-link" style="background: var(--secondary-gradient);">💶 Controlo de Mensalidades</a>
            </div>
            
            <div class="grid-2-col" style="margin-top: 15px;">
                <a href="treinadores.html" class="btn-link" style="background: #666; font-size: 0.8rem; padding: 12px;">🏃 Gerir Treinadores</a>
                <a href="escaloes.html" class="btn-link" style="background: #666; font-size: 0.8rem; padding: 12px;">🏐 Listas por Escalão</a>
            </div>
        </section>

        <footer style="text-align: center; color: #999; font-size: 0.8rem; margin-top: 50px;">
            Viana Volei Gestão &copy; 2026
        </footer>
    </main>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
