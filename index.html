<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Académicos - Sistema de Gestão</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>FC Académicos - Sistema de Gestão</h1>
        <nav>
            <a href="index.html" class="active">Dashboard</a>
            <a href="atletas.html">Atletas</a>
            <a href="treinadores.html">Treinadores</a>
            <a href="escaloes.html">Escalões</a>
            <a href="financeiro.html">Financeiro</a>
            <a href="#" id="btn-logout" style="color: #dc2626; margin-left: 15px; font-weight: 800;">SAIR</a>
        </nav>
    </header>

    <main class="container">
        <div class="grid-resumo">
            <div class="card-resumo">
                <h3>Atletas Inscritas</h3>
                <span id="count-atletas" class="count-number">0</span>
            </div>

            <div class="card-resumo">
                <h3>Treinadores</h3>
                <span id="count-treinadores" class="count-number">0</span>
            </div>
        </div>

        <section>
            <h2>Gestão Rápida</h2>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                <a href="atletas.html" class="btn-link">Registar Atleta</a>
                <a href="financeiro.html" class="btn-link btn-outline">Consultar Pagamentos</a>
            </div>
            
            <div style="margin-top: 30px; display: flex; gap: 20px; justify-content: center; border-top: 1px solid #eee; padding-top: 20px;">
                <a href="treinadores.html" style="color: #888; font-size: 0.75rem; text-decoration: none; font-weight: 600; text-transform: uppercase;">Configurar Staff</a>
                <a href="escaloes.html" style="color: #888; font-size: 0.75rem; text-decoration: none; font-weight: 600; text-transform: uppercase;">Listas de Equipas</a>
            </div>
        </section>

        <footer>
            FC Académicos &bull; Sistema Administrativo &bull; 2026
        </footer>
    </main>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
