<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viana Volei - Cadastro de Atletas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Viana Volei - Gestão</h1>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="atletas.html" class="active">Atletas</a>
            <a href="treinadores.html">Treinadores</a>
            <a href="financeiro.html">Financeiro</a>
        </nav>
    </header>

    <main class="container">
        <section id="cadastro">
            <h2>Ficha de Inscrição 2025-2026</h2>
            <form id="form-atleta">
                
                <fieldset>
                    <legend>1. Identificação da Atleta</legend>
                    <div class="input-group">
                        <label>Nome Completo</label>
                        <input type="text" id="nome" required>
                    </div>
                    <div class="grid-2-col">
                        <div class="input-group">
                            <label>Data de Nascimento</label>
                            <input type="date" id="data_nascimento" required>
                        </div>
                        <div class="input-group">
                            <label>Nacionalidade</label>
                            <input type="text" id="nacionalidade">
                        </div>
                    </div>
                    <div class="grid-2-col">
                        <div class="input-group">
                            <label>CC / Passaporte</label>
                            <input type="text" id="documento_id">
                        </div>
                        <div class="input-group">
                            <label>Validade CC</label>
                            <input type="date" id="validade_id">
                        </div>
                    </div>
                    <div class="grid-2-col">
                        <div class="input-group">
                            <label>NIF (Finanças)</label>
                            <input type="text" id="nif">
                        </div>
                        <div class="input-group">
                            <label>N° Utente (Saúde)</label>
                            <input type="text" id="numero_utente">
                        </div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>2. Família e Contactos</legend>
                    <div class="input-group">
                        <label>Nome do Pai</label>
                        <input type="text" id="nome_pai">
                    </div>
                    <div class="input-group">
                        <label>Nome da Mãe</label>
                        <input type="text" id="nome_mae">
                    </div>
                    <div class="input-group">
                        <label>Telemóvel de Contacto</label>
                        <input type="tel" id="telefone" required>
                    </div>
                    <div class="input-group">
                        <label>Morada</label>
                        <input type="text" id="morada">
                    </div>
                    <div class="input-group">
                        <label>Código Postal</label>
                        <input type="text" id="cod_postal" placeholder="4900-000">
                    </div>
                </fieldset>

                <fieldset>
                    <legend>3. Dados Desportivos</legend>
                    <div class="input-group">
                        <label>Escalão (Subdivisões dinâmicas)</label>
                        <select id="escalao" required>
                            <option value="">A carregar escalões...</option>
                        </select>
                        <small><a href="treinadores.html">Adicionar novo escalão aqui</a></small>
                    </div>
                    <div class="grid-2-col">
                        <div class="input-group">
                            <label>Licença FPV n.°</label>
                            <input type="text" id="licenca_fpv">
                        </div>
                        <div class="input-group">
                            <label>Desporto Escolar</label>
                            <select id="compromisso_escolar">
                                <option value="Não">Não</option>
                                <option value="Sim">Sim</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Profissão / Obs (Coluna 17)</label>
                        <input type="text" id="profissao">
                    </div>
                </fieldset>

                <button type="submit" id="btn-salvar">Gravar Atleta no Sistema</button>
            </form>
        </section>

        <hr>

        <section id="listagem">
            <h2>Lista de Atletas Registadas</h2>
            <div id="lista-cards" class="grid-atletas">
                </div>
        </section>
    </main>

    <script type="module" src="atletas.js"></script>
</body>
</html>
