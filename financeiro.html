<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Académicos - Sistema de Gestão</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>FC Académicos - Sistema de Gestão</h1>
        <nav>
            <a href="index.html">DASHBOARD</a>
            <a href="atletas.html">ATLETAS</a>
            <a href="treinadores.html">TREINADORES</a>
            <a href="escaloes.html">ESCALÕES</a>
            <a href="financeiro.html" class="active">FINANCEIRO</a>
            <a href="#" id="btn-logout" style="color: #dc2626; margin-left: 15px; font-weight: 800;">SAIR</a>
        </nav>
    </header>

    <main class="container" style="max-width: 1300px;">
        <section class="filtros-area" style="display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; align-items: center; background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #e5e5e7;">
            <div style="flex: 1; min-width: 180px;">
                <label style="font-size: 0.7rem; font-weight: 800; color: #888; display: block; margin-bottom: 5px;">ESCALÃO</label>
                <select id="filtro-escalao-fin" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ddd;"></select>
            </div>
            
            <div style="flex: 1; min-width: 180px;">
                <label style="font-size: 0.7rem; font-weight: 800; color: #888; display: block; margin-bottom: 5px;">VER APENAS</label>
                <select id="filtro-status-fin" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ddd;">
                    <option value="todos">Todas as Atletas</option>
                    <option value="pendente">Devedoras (Com falhas até hoje)</option>
                </select>
            </div>

            <div style="flex: 0.5; min-width: 120px;">
                <label style="font-size: 0.7rem; font-weight: 800; color: #888; display: block; margin-bottom: 5px;">ANO</label>
                <select id="filtro-ano-fin" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ddd;">
                    <option value="2026" selected>2026</option>
                    <option value="2027">2027</option>
                    <option value="2028">2028</option>
                    <option value="2029">2029</option>
                    <option value="2030">2030</option>
                    <option value="2031">2031</option>
                    <option value="2032">2032</option>
                    <option value="2033">2033</option>
                    <option value="2034">2034</option>
                    <option value="2035">2035</option>
                </select>
            </div>

            <button onclick="window.print()" style="height: 42px; align-self: flex-end; background: #1d1d1f; color: white; border: none; padding: 0 20px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.8rem;">🖨️ IMPRIMIR</button>
        </section>

        <div id="lista-financeiro-escaloes"></div>
    </main>

    <script type="module" src="financeiro.js"></script>
</body>
</html>
