<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treinadores - Viana Volei</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Viana Volei - Gestão</h1>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="atletas.html">Atletas</a>
            <a href="treinadores.html" class="active">Treinadores</a>
            <a href="escaloes.html">Escalões</a>
            <a href="financeiro.html">Financeiro</a>
        </nav>
    </header>
    <main class="container">
        <section>
            <h2>Criar Escalão/Subdivisão</h2>
            <div class="grid-2-col">
                <input type="text" id="novo-escalao" placeholder="Ex: Iniciadas B">
                <button id="btn-add-escalao" style="padding:10px">Adicionar Escalão</button>
            </div>
        </section>
        <form id="form-treinador">
            <fieldset>
                <legend>Registar Treinador</legend>
                <div class="input-group"><label>Nome</label><input type="text" id="t-nome" required></div>
                <div class="grid-2-col">
                    <div class="input-group"><label>NIF</label><input type="text" id="t-nif"></div>
                    <div class="input-group"><label>Escalão Responsável</label><select id="t-escalao-vinculo"></select></div>
                </div>
                <button type="submit">Gravar Treinador</button>
            </fieldset>
        </form>
    </main>
    <script type="module" src="treinadores.js"></script>
</body>
</html>
