<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treinadores - Viana Volei</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Viana Volei - Gestão</h1>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="atletas.html">Atletas</a>
            <a href="treinadores.html" class="active">Treinadores</a>
            <a href="financeiro.html">Financeiro</a>
        </nav>
    </header>
    <main class="container">
        <fieldset>
            <legend>Novo Escalão</legend>
            <div style="display:flex; gap:10px">
                <input type="text" id="novo-escalao" placeholder="Ex: Iniciadas B" style="flex:1">
                <button id="btn-add-escalao" style="width:auto">Adicionar</button>
            </div>
            <div id="lista-escaloes-tags" style="margin-top:10px"></div>
        </fieldset>

        <form id="form-treinador">
            <fieldset>
                <legend>Dados do Treinador</legend>
                <div class="input-group"><label>Nome</label><input type="text" id="t-nome" required></div>
                <div class="input-group"><label>Escalão Vinculado</label><select id="t-escalao-vinculo"></select></div>
                <button type="submit">Gravar Treinador</button>
            </fieldset>
        </form>
        <div id="lista-treinadores"></div>
    </main>
    <script type="module" src="treinadores.js"></script>
</body>
</html>
