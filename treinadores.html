<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Staff - Viana Volei</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>Viana Volei</h1>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="atletas.html">Atletas</a>
            <a href="treinadores.html" class="active">Treinadores</a>
            <a href="escaloes.html">Escalões</a>
            <a href="financeiro.html">Financeiro</a>
        </nav>
    </header>

    <main class="container" style="max-width: 1200px;">
        <section style="margin-bottom: 20px; padding: 20px;">
            <h2 style="font-size: 0.8rem;">Configuração de Escalões</h2>
            <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                <input type="text" id="novo-escalao" placeholder="Novo Escalão" style="padding: 8px; flex: 1; max-width: 250px;">
                <button id="btn-add-escalao" style="padding: 10px 20px; font-size: 0.7rem;">Adicionar</button>
                <div id="lista-escaloes-preview" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
            </div>
        </section>

        <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; align-items: start;">
            
            <section style="padding: 25px;">
                <h2 id="titulo-form-treinador">Registo de Staff</h2>
                <form id="form-treinador">
                    <input type="hidden" id="treinador-id">
                    
                    <div class="input-group">
                        <label>Nome Completo</label>
                        <input type="text" id="t-nome" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Telemóvel</label>
                        <input type="tel" id="t-telefone" required>
                    </div>

                    <div class="input-group">
                        <label>Escalão</label>
                        <select id="t-escalao-vinculo" required>
                            <option value="">A carregar...</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Cédula/Licença</label>
                        <input type="text" id="t-licenca">
                    </div>

                    <div id="area-botoes-treinador">
                        <button type="submit" id="btn-gravar-t" style="width: 100%;">Gravar Treinador</button>
                    </div>

                    <div id="botoes-edicao-t" style="display: none; gap: 10px; margin-top: 10px;">
                        <button type="button" id="btn-atualizar-t" style="flex: 2; background: #333;">Atualizar</button>
                        <button type="button" id="btn-cancelar-t" style="flex: 1; background: #eee; color: #333;">X</button>
                    </div>
                </form>
            </section>

            <section style="padding: 25px;">
                <h2>Equipa Técnica Cadastrada</h2>
                <div id="lista-treinadores-cards" style="display: grid; gap: 10px; margin-top: 20px;">
                    </div>
            </section>
        </div>
    </main>

    <script type="module" src="treinadores.js"></script>
</body>
</html>
